name: ibd-r

channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  - r-base=4.4
  - r-tidyverse
  - r-readr
  - r-dplyr
  - r-tibble
  - r-stringr
  - r-ggplot2
  - r-vegan
  - r-irkernel
  
  # Pin rbiom to avoid incompatibility with curatedMetagenomicData
  - r-rbiom=2.2.1

  # Bioconductor
  - bioconductor-summarizedexperiment
  - bioconductor-treesummarizedexperiment
  - bioconductor-curatedmetagenomicdata
  - bioconductor-biocfilecache

  # Useful helpers
  - r-remotes
  - r-devtools