$schema: "https://json-schema.org/draft/2020-12/schema"

type: object

required:
  - paths
  - dataset
  - metadata
  - preprocessing
  - params

properties:
  paths:
    type: object
    required:
      - data_raw
      - data_metadata
      - data_processed
      - results
      - logs
      - figures
      - models
      - tables
    properties:
      data_raw:
        type: string
      data_metadata:
        type: string
      data_processed:
        type: string
      results:
        type: string
      logs:
        type: string
      figures:
        type: string
      models:
        type: string
      tables:
        type: string
    additionalProperties: false

  dataset:
    type: object
    required:
      - study_name
      - body_site
    properties:
      study_name:
        type: string
      body_site:
        type: string
    additionalProperties: false

  metadata:
    type: object
    required:
      - sample_id_column
      - disease_column
      - healthy_label
      - ibd_label
    properties:
      sample_id_column:
        type: string
      disease_column:
        type: string
      healthy_label:
        type: string
      ibd_label:
        type: string
    additionalProperties: false

  preprocessing:
    type: object
    required:
      - min_prevalence
      - transformation
    properties:
      min_prevalence:
        type: number
        minimum: 0
        maximum: 1
      transformation:
        type: string
        enum:
          - log1p
          - clr
    additionalProperties: false

  params:
    type: object
    required:
      - threads
    properties:
      threads:
        type: integer
        minimum: 1
    additionalProperties: false

additionalProperties: false